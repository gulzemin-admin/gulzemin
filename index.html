<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gül Zemin - Ekskluziw</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #A67C52; --bg: #FFFDF9; --dark: #1A1A1A; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--dark); line-height: 1.6; }
        .header { background: #fff; text-align: center; padding: 40px 20px; border-bottom: 1px solid #eee; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--gold); margin-bottom: 5px; }
        .header p { font-size: 12px; letter-spacing: 3px; color: #999; text-transform: uppercase; }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .item { background: #fff; border: 1px solid #f0f0f0; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.02); transition: 0.3s; }
        .item:hover { transform: translateY(-5px); }
        .img-box { width: 100%; height: 350px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 20px; text-align: center; }
        .info h3 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 10px; }
        .price { font-size: 20px; color: var(--gold); font-weight: 600; display: block; margin-bottom: 15px; }
        /* Buton Grubu */
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn { flex: 1; text-decoration: none; padding: 12px 5px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; border-radius: 4px; transition: 0.3s; text-align: center; }
        .btn-whp { background-color: #25D366; color: white; }
        .btn-imo { background-color: #2196F3; color: white; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        footer { text-align: center; padding: 40px; font-size: 10px; color: #ccc; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Gül Zemin</h1>
    <p>Premium Florist Boutique</p>
</div>

<div class="container">

    <div class="item">

            <img src="blob:https://imgur.com/2cab0b84-e366-4a93-aadf-e692e4ecfa27.jpeg" alt="Gül Buketi">
             <img src="blob:https://imgur.com/72843e6a-32e5-4863-ba2d-2d0527d48643.jpeg" alt="ROSES">
            <img src="https://i.imgur.com/7MKQXM0.jpeg" alt="ORKİDE">
        </div>
        <div class="info">
            <h3>Royal Red Roses</h3>
            <span class="price">1200 TMT</span>
            <div class="btn-group">
                <a href="https://wa.me/99365XXXXXXX?text=Salam, men Royal Red Roses sargyt etmek isleýärin" class="btn btn-whp">WhatsApp</a>
                <a href="https://imo.im/_u/99365XXXXXXX" class="btn btn-imo">IMO</a>
            </div>
        </div>
    </div>
    <div class="item">
        <div class="img-box">
            <img src="+++++" alt="Ak Güller">
        </div>
        <div class="info">
            <h3>White Elegance</h3>
            <span class="price">800 TMT</span>
            <div class="btn-group">
                <a href="https://wa.me/99365XXXXXXX?text=Salam, men White Elegance sargyt etmek isleýärin" class="btn btn-whp">WhatsApp</a>
                <a href="https://imo.im/_u/99365XXXXXXX" class="btn btn-imo">IMO</a>
            </div>
        </div>
    </div>
    </div>

<footer>
    © 2026 GÜL ZEMIN - ÄHLISINDEN IŇ GOWUSY
</footer>

</body>
</html>
